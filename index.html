<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhanTom Graphics | الرئيسية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body {
            background-image: url('background.png.PNG'); /* خلفيتك المموجة */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            color: #fff;
        }

        .container {
            backdrop-filter: blur(15px); /* تأثير الزجاج */
            background: rgba(0, 0, 0, 0.4); /* خلفية سوداء شفافة فخمة */
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .main-logo {
            width: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .item-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.08); /* شكل البطاقة مثل TXStore */
            margin: 12px 0;
            padding: 12px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .item-card img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            margin-left: 15px;
            object-fit: cover;
        }

        .item-info {
            text-align: right;
            flex-grow: 1;
        }

        .item-title {
            font-weight: bold;
            font-size: 1.1em;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .item-price {
            font-size: 0.85em;
            color: #3498db; /* لون أزرق هادئ للسعر */
            font-weight: bold;
        }

        .payment-section {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 18px;
        }

        .payment-section p {
            color: #1a1a1a;
            font-size: 0.9em;
            font-weight: bold;
            margin: 0 0 8px 0;
        }

        .payment-img {
            width: 100%;
            max-width: 280px;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png.PNG" alt="Phantom Logo" class="main-logo">

        <div class="item-card">
            <img src="design_order.png.PNG" alt="Design">
            <div class="item-info">
                <div class="item-title">طلب تصميم</div>
                <div class="item-price">السعر: على حسب التصميم</div>
            </div>
        </div>

        <div class="item-card">
            <img src="learn_order.png.PNG" alt="Learn">
            <div class="item-info">
                <div class="item-title">طلب مبدع</div>
                <div class="item-price">السعر: يحدد لاحقاً</div>
            </div>
        </div>

        <div class="payment-section">
            <p>طرق الدفع المعتمدة</p>
            <img src="payment_methods.png.PNG" class="payment-img" alt="Payments">
        </div>
    </div>

</body>
</html>
