<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhanTom Graphics | المتجر</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        :root { --primary-blue: #4a6fff; --main-font: 'Cairo', sans-serif; }
        * { box-sizing: border-box; }
        body {
            background-image: url('background.png.PNG');
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: var(--main-font); margin: 0; padding: 0; direction: rtl;
        }
        .header {
            background: rgba(255, 255, 255, 0.95); padding: 10px 5%;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #eee;
        }
        .header h1 { font-size: 0.9rem; color: var(--primary-blue); margin: 0; }
        .header-logo { width: 40px; height: 40px; object-fit: contain; }
        .main-container { margin-top: 80px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .page-section { display: none; width: 100%; max-width: 500px; text-align: center; color: white; }
        #home-section { display: block; }
        .home-btn {
            display: block; width: 100%; max-width: 280px; background: white; color: var(--primary-blue);
            border: none; padding: 14px; margin: 12px auto; border-radius: 12px; font-weight: bold; cursor: pointer; text-decoration: none; font-family: var(--main-font);
        }
        .order-card { background: rgba(255, 255, 255, 0.98); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); color: #333; text-align: right; margin-bottom: 20px; }
        .order-card img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 5px; }
        select, input, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: var(--main-font); font-size: 0.9rem; outline: none; }
        .other-input { display: none; margin-top: 8px; }
        .stars-container { color: #f1c40f; font-size: 2rem; margin: 15px 0; text-align: center; cursor: pointer; }
        .submit-btn { background: var(--primary-blue); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; font-family: var(--main-font); font-size: 1rem; }
        .back-btn { display: inline-block; background: #eee; color: #333; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.8rem; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PhanTom Graphics</h1>
        <img src="logo.Png.PNG" class="header-logo">
        <div style="text-align:left;">🛒</div>
    </div>

    <div class="main-container">
        <div id="home-section" class="page-section">
            <h2 class="welcome-title">مرحباً بك في Phantom Graphics</h2>
            <p>الأفضل بأرخص الأسعار</p>
            <button class="home-btn" onclick="showPage('design-section')">تصفح المنتجات (تصميم)</button>
            <button class="home-btn" onclick="showPage('learn-section')">طلب تعليم</button>
        </div>

        <div id="design-section" class="page-section">
            <div class="order-card">
                <img src="design_order.png.PNG">
                <div class="form-group"><label>اسم السيرفر:</label><input type="text" id="d-server"></div>
                <div class="form-group">
                    <label>نوع التصميم:</label>
                    <select id="d-type" onchange="toggleOther(this, 'd-other-type')">
                        <option>واقعية</option><option>شوب</option><option>جرافيك</option><option>كود</option><option value="أخرى">أخرى</option>
                    </select>
                    <input type="text" id="d-other-type" class="other-input" placeholder="اذكر النوع">
                </div>
                <div class="form-group"><label>اللوقو:</label><select id="d-logo"><option>متحرك</option><option>ثابت</option></select></div>
                <div class="form-group"><label>بنر:</label><select id="d-banner"><option>متحرك</option><option>ثابت</option></select></div>
                <div class="form-group"><label>خط:</label><select id="d-font"><option>متحرك</option><option>ثابت</option></select></div>
                <div class="form-group"><label>اختصار السيرفر:</label><input type="text" id="d-short"></div>
                
                <div class="stars-container" id="d-stars">
                    <span onclick="rate('d', 1)">☆</span><span onclick="rate('d', 2)">☆</span><span onclick="rate('d', 3)">☆</span><span onclick="rate('d', 4)">☆</span><span onclick="rate('d', 5)">☆</span>
                </div>
                <button class="submit-btn" onclick="sendToDiscord('design')">إرسال طلب التصميم 🚀</button>
            </div>
            <div class="back-btn" onclick="showPage('home-section')">رجوع</div>
        </div>

        <div id="learn-section" class="page-section">
            <div class="order-card">
                <img src="learn_order.png.PNG">
                <div class="form-group">
                    <label>مستواك:</label>
                    <select id="l-level"><option>لا تعرف</option><option>مبتدئ</option><option>متوسط</option><option>متقدم</option></select>
                </div>
                <div class="form-group">
                    <label>التخصص:</label>
                    <select id="l-type" onchange="toggleOther(this, 'l-other-type')">
                        <option>واقعية</option><option>شوب</option><option>جرافيك</option><option>كود</option><option value="أخرى">أخرى</option>
                    </select>
                    <input type="text" id="l-other-type" class="other-input" placeholder="اذكر التخصص">
                </div>
                <div class="stars-container" id="l-stars">
                    <span onclick="rate('l', 1)">☆</span><span onclick="rate('l', 2)">☆</span><span onclick="rate('l', 3)">☆</span><span onclick="rate('l', 4)">☆</span><span onclick="rate('l', 5)">☆</span>
                </div>
                <button class="submit-btn" onclick="sendToDiscord('learn')">إرسال طلب التعليم 🚀</button>
            </div>
            <div class="back-btn" onclick="showPage('home-section')">رجوع</div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1486873204151685281/5ysQrKoBlgAf2VMejK_rEPf1BFK9jvCChr100hIKxWkG8mq3YKs1sWxWsTbkUfHo6wuq";

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            window.scrollTo(0, 0);
        }

        function toggleOther(s, id) { document.getElementById(id).style.display = (s.value === 'أخرى') ? 'block' : 'none'; }

        let ratings = { d: 0, l: 0 };
        function rate(sec, n) {
            ratings[sec] = n;
            const spans = document.getElementById(sec + '-stars').querySelectorAll('span');
            spans.forEach((s, i) => s.innerHTML = (i < n) ? '⭐' : '☆');
        }

        async function sendToDiscord(mode) {
            let content = "";
            if(mode === 'design') {
                const srv = document.getElementById('d-server').value;
                if(!srv) return alert('اكتب اسم السيرفر');
                content = `🎨 **طلب تصميم جديد!**\n🏰 السيرفر: ${srv}\n⭐ التقييم: ${ratings.d} نجوم`;
            } else {
                content = `📚 **طلب تعليم جديد!**\n🎓 المستوى: ${document.getElementById('l-level').value}\n⭐ التقييم: ${ratings.l} نجوم`;
            }

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: "@everyone " + content })
                });
                alert('تم الإرسال بنجاح ✅');
                showPage('home-section');
            } catch (e) { alert('خطأ في الإرسال'); }
        }
    </script>
</body>
</html>
