<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhanTom Graphics | متجر</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body {
            background-image: url('background.png.PNG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        .container {
            backdrop-filter: blur(15px);
            background: rgba(0, 0, 0, 0.6);
            padding: 25px;
            border-radius: 25px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header { margin-bottom: 20px; text-align: center; }
        .header img { width: 100px; }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .product-card img { width: 60px; height: 60px; border-radius: 10px; margin-left: 15px; }
        
        .product-info { flex-grow: 1; text-align: right; }
        .product-name { font-weight: bold; font-size: 1.1em; }
        .product-price { font-size: 0.9em; color: #3498db; }

        .add-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo';
            font-size: 0.8em;
            transition: 0.3s;
        }

        .add-btn:active { transform: scale(0.9); }

        .cart-section {
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            margin-bottom: 5px;
            background: rgba(255,255,255,0.02);
            padding: 5px 10px;
            border-radius: 5px;
        }

        .checkout-btn {
            width: 100%;
            background: #3498db;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1em;
            margin-top: 15px;
            cursor: pointer;
            font-family: 'Cairo';
        }

        /* نافذة الفاتورة للتصوير */
        #invoice {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 350px;
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 99;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png.PNG" alt="PhanTom">
        <h2>متجر فانتوم</h2>
    </div>

    <div class="product-card">
        <img src="design_order.png.PNG" alt="Design">
        <div class="product-info">
            <div class="product-name">طلب تصميم</div>
            <div class="product-price">على حسب الطلب</div>
        </div>
        <button class="add-btn" onclick="addToCart('طلب تصميم')">إضافة</button>
    </div>

    <div class="product-card">
        <img src="learn_order.png.PNG" alt="Learn">
        <div class="product-info">
            <div class="product-name">طلب تعليم</div>
            <div class="product-price">على حسب الطلب</div>
        </div>
        <button class="add-btn" onclick="addToCart('طلب تعليم')">إضافة</button>
    </div>

    <div class="cart-section">
        <p>السلة 🛒</p>
        <div id="cart-list"></div>
        <button class="checkout-btn" onclick="showInvoice()">إتمام الدفع (تصوير الشاشة)</button>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div id="invoice">
    <h3 style="color: #27ae60;">تأكيد الطلب ✅</h3>
    <p>يرجى تصوير الشاشة وإرسالها في التكت</p>
    <hr>
    <div id="invoice-items" style="text-align: right; margin-bottom: 20px;"></div>
    <p style="font-size: 0.8em; color: #666;">PhanTom Graphics Store</p>
    <button onclick="closeInvoice()" style="background: #eee; border: none; padding: 5px 15px; border-radius: 5px;">إغلاق</button>
</div>

<script>
    let cart = [];

    function addToCart(name) {
        cart.push(name);
        updateCart();
    }

    function updateCart() {
        const list = document.getElementById('cart-list');
        list.innerHTML = '';
        cart.forEach((item, index) => {
            list.innerHTML += `<div class="cart-item"><span>${item}</span><span onclick="removeItem(${index})" style="color:#e74c3c; cursor:pointer;">X</span></div>`;
        });
    }

    function removeItem(index) {
        cart.splice(index, 1);
        updateCart();
    }

    function showInvoice() {
        if(cart.length === 0) return alert('السلة فارغة!');
        const invItems = document.getElementById('invoice-items');
        invItems.innerHTML = cart.map(item => `• ${item} (على حسب الطلب)<br>`).join('');
        document.getElementById('invoice').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeInvoice() {
        document.getElementById('invoice').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
</script>

</body>
</html>
