<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhanTom Graphics | المتجر</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        :root { --primary-blue: #4a6fff; --main-font: 'Cairo', sans-serif; }
        * { box-sizing: border-box; }
        body {
            background-image: url('background.png.PNG');
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: var(--main-font); margin: 0; padding: 0; direction: rtl;
        }

        /* الهيدر */
        .header {
            background: rgba(255, 255, 255, 0.95); padding: 10px 5%;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #eee;
        }
        .header h1 { font-size: 0.9rem; color: var(--primary-blue); margin: 0; text-align: right; }
        .header-logo { width: 40px; height: 40px; object-fit: contain; }
        .cart-icon { font-size: 1.3rem; text-align: left; cursor: pointer; color: #333; }

        .main-container { margin-top: 80px; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* ستايل الأقسام (مخفية تلقائياً) */
        .page-section { display: none; width: 100%; max-width: 500px; text-align: center; color: white; }
        #home-section { display: block; } /* الرئيسية تظهر أولاً */

        /* الأزرار العائمة في الرئيسية */
        .welcome-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .home-btn {
            display: block; width: 100%; max-width: 280px; background: white; color: var(--primary-blue);
            border: none; padding: 14px; margin: 12px auto; border-radius: 12px; font-weight: bold; cursor: pointer; text-decoration: none; font-family: var(--main-font);
        }

        /* كرت التصميم والتعليم (شكل احترافي) */
        .order-card { background: rgba(255, 255, 255, 0.98); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); color: #333; text-align: right; margin-bottom: 20px; }
        .order-card img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        
        /* تنسيق الفورم (المنيو والكتابة) */
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 5px; }
        select, input, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: var(--main-font); font-size: 0.9rem; outline: none; }
        textarea { height: 80px; resize: none; }
        .other-input { display: none; margin-top: 8px; }

        /* النجوم والزر الرئيسي */
        .stars-container { color: #f1c40f; font-size: 2rem; margin: 15px 0; text-align: center; cursor: pointer; }
        .submit-btn { background: var(--primary-blue); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; font-family: var(--main-font); font-size: 1rem; }
        
        .back-btn { display: inline-block; background: #eee; color: #333; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.8rem; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PhanTom Graphics</h1>
        <img src="logo.Png.PNG" alt="Logo" class="header-logo">
        <div class="cart-icon">🛒</div>
    </div>

    <div class="main-container">

        <div id="home-section" class="page-section">
            <div class="welcome-title">مرحباً بك في Phantom Graphics</div>
            <p style="font-weight: bold;">الأفضل بأرخص الأسعار</p>
            <button class="home-btn" onclick="showPage('design-section')">طلب تصميم</button>
            <button class="home-btn" onclick="showPage('learn-section')">طلب تعليم</button>
            <a href="https://discord.gg/U3jW9U3N3" target="_blank" class="home-btn" style="background: #5865F2; color: white; margin-top: 20px;">انضم للديسكورد</a>
        </div>

        <div id="design-section" class="page-section">
            <div class="order-card">
                <img src="design_order.png.PNG" alt="Design">
                <h3 style="text-align:center; margin-top:0;">تقديم طلب تصميم</h3>
                
                <div class="form-group"><label>اسم السيرفر:</label><input type="text" id="d-server" placeholder="مثلاً: سيرفر فانتوم"></div>
                
                <div class="form-group">
                    <label>نوع التصميم:</label>
                    <select id="d-type" onchange="toggleOther(this, 'd-other-type')">
                        <option value="واقعية">واقعية</option>
                        <option value="شوب">شوب</option>
                        <option value="جرافيك">جرافيك</option>
                        <option value="كود">كود</option>
                        <option value="أخرى">أخرى</option>
                    </select>
                    <input type="text" id="d-other-type" class="other-input" placeholder="اذكر النوع الذي تريده">
                </div>

                <div class="form-group"><label>اللوقو:</label><select id="d-logo"><option value="متحرك">متحرك</option><option value="ثابت">ثابت</option></select></div>
                <div class="form-group"><label>بنر:</label><select id="d-banner"><option value="متحرك">متحرك</option><option value="ثابت">ثابت</option></select></div>
                <div class="form-group"><label>خط:</label><select id="d-font"><option value="متحرك">متحرك</option><option value="ثابت">ثابت</option></select></div>
                
                <div class="form-group"><label>اختصار السيرفر:</label><input type="text" id="d-short" placeholder="مثلاً: PT"></div>
                <div class="form-group"><label>صور الإعلانات:</label><textarea id="d-ads" placeholder="اذكر عدد الصور أو تفاصيلها"></textarea></div>
                <div class="form-group"><label>صور الإنفو:</label><textarea id="d-info"></textarea></div>
                <div class="form-group"><label>صور البوتات:</label><textarea id="d-bots"></textarea></div>

                <div class="stars-container" id="d-stars">
                    <span onclick="rate('d', 1)">☆</span><span onclick="rate('d', 2)">☆</span><span onclick="rate('d', 3)">☆</span><span onclick="rate('d', 4)">☆</span><span onclick="rate('d', 5)">☆</span>
                </div>
                
                <button class="submit-btn">إرسال طلب التصميم للديسكورد 🚀</button>
            </div>
            <div class="back-btn" onclick="showPage('home-section')">رجوع للرئيسية</div>
        </div>

        <div id="learn-section" class="page-section">
            <div class="order-card">
                <img src="learn_order.png.PNG" alt="Learn">
                <h3 style="text-align:center; margin-top:0;">تقديم طلب تعليم</h3>
                
                <div class="form-group">
                    <label>مستواك بالتخصص الذي تريده:</label>
                    <select id="l-level">
                        <option value="لا تعرف أبداً">لا تعرف أبداً</option>
                        <option value="مستجد">مستجد</option>
                        <option value="مبتدئ">مبتدئ</option>
                        <option value="متوسط">متوسط</option>
                        <option value="متقدم">متقدم</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>التخصص الذي تريد تعلمه:</label>
                    <select id="l-type" onchange="toggleOther(this, 'l-other-type')">
                        <option value="واقعية">واقعية</option>
                        <option value="شوب">شوب</option>
                        <option value="جرافيك">جرافيك</option>
                        <option value="كود">كود</option>
                        <option value="أخرى">أخرى</option>
                    </select>
                    <input type="text" id="l-other-type" class="other-input" placeholder="اذكر التخصص الذي تبيه">
                </div>

                <div class="stars-container" id="l-stars">
                    <span onclick="rate('l', 1)">☆</span><span onclick="rate('l', 2)">☆</span><span onclick="rate('l', 3)">☆</span><span onclick="rate('l', 4)">☆</span><span onclick="rate('l', 5)">☆</span>
                </div>
                
                <button class="submit-btn">إرسال طلب التعليم للديسكورد 🚀</button>
            </div>
            <div class="back-btn" onclick="showPage('home-section')">رجوع للرئيسية</div>
        </div>

    </div>

    <script>
        // دالة التنقل بين الصفحات
        function showPage(pageId) {
            // إخفاء كل الصفحات
            document.querySelectorAll('.page-section').forEach(page => {
                page.style.display = 'none';
            });
            // إظهار الصفحة المطلوبة
            document.getElementById(pageId).style.display = 'block';
            // النزول لأعلى الصفحة
            window.scrollTo(0, 0);
        }

        // دالة إظهار وإخفاء حقل "أخرى"
        function toggleOther(selectElement, otherInputId) {
            const otherInput = document.getElementById(otherInputId);
            if (selectElement.value === 'أخرى') {
                otherInput.style.display = 'block';
            } else {
                otherInput.style.display = 'none';
            }
        }

        // دالة النجوم التفاعلية (مع تمييز أي قسم)
        const ratings = { d: 0, l: 0 }; // حفظ التقييم لكل قسم
        function rate(section, n) {
            ratings[section] = n;
            const starBox = document.getElementById(section + '-stars');
            const spans = starBox.querySelectorAll('span');
            spans.forEach((s, i) => {
                if (i < n) {
                    s.innerHTML = '⭐'; // نجمة ممتلئة
                } else {
                    s.innerHTML = '☆'; // نجمة فارغة
                }
            });
        }
    </script>
</body>
</html>
